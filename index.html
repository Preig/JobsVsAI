const W = 1080, H = 760;
const margin = {top: 8, right: 56, bottom: 56, left: 56};
const plotW = W - margin.left - margin.right;
const plotH = H - margin.top - margin.bottom;

const chartDiv = d3.select("#chart");
const svg = chartDiv.append("svg").attr("class","main")
  .attr("viewBox", `0 0 ${W} ${H}`).attr("preserveAspectRatio","xMidYMid meet");

const x = d3.scaleLinear().domain([0, 0.85]).range([margin.left, margin.left + plotW]);
const y = d3.scaleLinear().domain([0, 1]).range([margin.top + plotH, margin.top]);
const rScale = d3.scaleSqrt().domain([1000, 4000000]).range([3, 34]);
const colorScale = d3.scaleLinear()
  .domain([-0.85, -0.45, -0.15, 0, 0.15, 0.45, 0.85])
  .range(["#2c6f7e", "#5a9fae", "#a8c8cf", "#dcdcdc", "#e9c4a3", "#d98a4f", "#b4632a"])
  .clamp(true);

svg.append("text").attr("class","y-side").attr("x", 4).attr("y", margin.top + 18).text("MOST");

  const node = nodes.find(n => n.n === a.name);
  if (!node) return;
  const tx = node.x + a.dx, ty = node.y + a.dy;
  const labelText = a.name === "Translators and interpreters" ? "Interpreters and translators"
                  : a.name === "Secretaries and admin assistants" ? "Secretaries"
                  : a.name;
  const path = `M ${tx} ${ty} Q ${(tx + node.x)/2} ${ty + 6} ${node.x} ${node.y - node.r - 1}`;
  gA.append("path").attr("d", path);
  gA.append("text").attr("x", tx).attr("y", ty - 2)
    .attr("text-anchor", a.anchor).text(labelText);
});

const tt = d3.select("#tt");
function fmtNum(n) { return d3.format(",")(Math.round(n)); }
function showTip(event, d) {
  tt.html(`
    <span class="close">&times;</span>
    <div class="title">${d.n}</div>
    <div class="row"><span class="lab">Vulnerability</span>
      <span class="val"><span class="pill ${d.cat}">${d.cat}</span></span></div>
    <div class="row"><span class="lab">Number of workers</span>
      <span class="val">${fmtNum(d.w)}</span></div>
    <div class="row"><span class="lab">Percent women</span>
      <span class="val">${d.pw}%</span></div>
  `).classed("show", true);
  positionTip(event);
}
function positionTip(event) {
  const wrapRect = chartDiv.node().getBoundingClientRect();
  const px = event.clientX - wrapRect.left;
  const py = event.clientY - wrapRect.top;
  const ttNode = tt.node();
  const w = ttNode.offsetWidth, h = ttNode.offsetHeight;
  let left = px + 14, top = py + 14;
  if (left + w > wrapRect.width) left = px - w - 14;
  if (top + h > wrapRect.height) top = py - h - 14;
  tt.style("left", left + "px").style("top", top + "px");
}
function hideTip() { tt.classed("show", false); }

bubbles
  .on("mouseenter", function(event, d) {
    d3.select(this).attr("stroke", "#1a1a1a").attr("stroke-width", 1.4)
      .attr("fill-opacity", 1);
    showTip(event, d);
  })
  .on("mousemove", function(event) { positionTip(event); })
  .on("mouseleave", function(event, d) {
    d3.select(this).attr("stroke", d.lbl ? "#1a1a1a" : "none")
      .attr("stroke-width", d.lbl ? 1.2 : 0)
      .attr("fill-opacity", 0.78);
    hideTip();
  });

const input = document.getElementById("search");
input.addEventListener("input", () => {
  const q = input.value.trim().toLowerCase();
  if (!q) { bubbles.classed("dim", false).classed("match", false); return; }
  bubbles.each(function(d) {
    const isMatch = d.n.toLowerCase().includes(q);
    d3.select(this).classed("dim", !isMatch).classed("match", isMatch);
  });
});
